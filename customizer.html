<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapPrint Design Studio | Customize Your Product</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <!-- Fabric.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .studio-header {
            height: 64px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-muted);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* Main Layout */
        .studio-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Tools */
        .tools-sidebar {
            width: 80px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 20px;
        }

        .tool-btn {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
        }

        .tool-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.05);
        }

        .tool-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tool-btn span {
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Canvas Area */
        .editor-workspace {
            flex: 1;
            background: #1e293b;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .canvas-container-wrapper {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: white;
            position: relative;
        }

        /* Floating Properties Panel */
        .properties-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: none; /* Shown when object selected */
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .panel-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .input-dark {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            font-size: 0.85rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Mobile Controls */
        .mobile-bottom-tools {
            display: none;
            height: 60px;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
            padding: 0 16px;
            justify-content: space-around;
            align-items: center;
        }

        @media (max-width: 768px) {
            .tools-sidebar { display: none; }
            .properties-panel { 
                width: calc(100% - 40px);
                bottom: 80px;
                top: auto;
            }
            .mobile-bottom-tools { display: flex; }
        }
    </style>
</head>
<body>
    <header class="studio-header">
        <div class="logo" onclick="window.location.href='index.html'">
            <h1>SnapPrint Studio</h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline">Preview 3D</button>
            <button class="btn btn-primary">Save Design</button>
        </div>
    </header>

    <div class="studio-container">
        <!-- Sidebar -->
        <aside class="tools-sidebar">
            <div class="tool-btn" id="add-text-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
                <span>Text</span>
            </div>
            <div class="tool-btn" id="add-image-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Image</span>
            </div>
            <div class="tool-btn" id="layers-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                <span>Layers</span>
            </div>
            <div style="margin-top: auto; padding-bottom: 20px;">
                <div class="tool-btn" id="delete-btn" style="border-color: rgba(239, 68, 68, 0.3); color: #ef4444;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </div>
            </div>
        </aside>

        <!-- Workspace -->
        <main class="editor-workspace">
            <div class="canvas-container-wrapper">
                <canvas id="design-canvas"></canvas>
            </div>

            <!-- Properties Panel (Floating) -->
            <div class="properties-panel" id="properties-panel">
                <div class="panel-title">
                    <span id="obj-type-label">Edit Object</span>
                    <button id="close-panel" style="background:none; border:none; color:white; cursor:pointer;">&times;</button>
                </div>
                
                <div id="text-controls" class="control-group">
                    <label class="control-label">Text Content</label>
                    <textarea class="input-dark" id="text-input" rows="2"></textarea>
                    
                    <div style="margin-top: 12px;">
                        <label class="control-label">Font Family</label>
                        <select class="input-dark" id="font-select">
                            <option value="Inter">Inter</option>
                            <option value="Outfit">Outfit</option>
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Serif</option>
                        </select>
                    </div>

                    <div class="grid-2" style="margin-top: 12px;">
                        <div>
                            <label class="control-label">Font Size</label>
                            <input type="number" class="input-dark" id="size-input" value="40">
                        </div>
                        <div>
                            <label class="control-label">Color</label>
                            <input type="color" class="input-dark" id="color-input" style="padding: 2px;">
                        </div>
                    </div>
                </div>

                <div id="image-controls" class="control-group" style="display:none;">
                    <label class="control-label">Opacity</label>
                    <input type="range" min="0" max="1" step="0.1" id="opacity-slider" style="width:100%;">
                </div>

                <div class="control-group">
                    <label class="control-label">Layer Position</label>
                    <div class="grid-2">
                        <button class="btn btn-outline" id="bring-front" style="padding: 6px; font-size: 10px;">Bring Front</button>
                        <button class="btn btn-outline" id="send-back" style="padding: 6px; font-size: 10px;">Send Back</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Tools -->
    <div class="mobile-bottom-tools">
         <!-- To be implemented -->
         <span>Tools Coming Soon for Mobile</span>
    </div>

    <!-- Hidden Input for File Upload -->
    <input type="file" id="image-upload" style="display: none;" accept="image/*">

    <script>
        let canvas;
        
        window.onload = () => {
            initCanvas();
            setupControls();
        };

        function initCanvas() {
            canvas = new fabric.Canvas('design-canvas', {
                width: 800,
                height: 400,
                backgroundColor: '#ffffff',
                preserveObjectStacking: true
            });

            // Add an initial text just for demo
            const welcomeText = new fabric.IText('Your Design Here', {
                left: 100,
                top: 100,
                fontFamily: 'Inter',
                fontSize: 40,
                fill: '#0f172a'
            });
            canvas.add(welcomeText);
            canvas.setActiveObject(welcomeText);
            canvas.renderAll();
        }

        function setupControls() {
            // Add Text
            document.getElementById('add-text-btn').onclick = () => {
                const text = new fabric.IText('New Text', {
                    left: 200,
                    top: 150,
                    fontFamily: 'Inter',
                    fontSize: 30,
                    fill: '#333333'
                });
                canvas.add(text);
                canvas.setActiveObject(text);
            };

            // Add Image
            document.getElementById('add-image-btn').onclick = () => {
                document.getElementById('image-upload').click();
            };

            document.getElementById('image-upload').onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (f) => {
                    const data = f.target.result;
                    fabric.Image.fromURL(data, (img) => {
                        img.scaleToWidth(200);
                        canvas.add(img);
                        canvas.setActiveObject(img);
                    });
                };
                reader.readAsDataURL(file);
            };

            // Delete
            document.getElementById('delete-btn').onclick = () => {
                const active = canvas.getActiveObject();
                if (active) {
                    canvas.remove(active);
                    document.getElementById('properties-panel').style.display = 'none';
                }
            };

            // Canvas Selection Events
            canvas.on('selection:created', showProperties);
            canvas.on('selection:updated', showProperties);
            canvas.on('selection:cleared', () => {
                document.getElementById('properties-panel').style.display = 'none';
            });

            function showProperties() {
                const active = canvas.getActiveObject();
                const panel = document.getElementById('properties-panel');
                panel.style.display = 'block';

                const textControls = document.getElementById('text-controls');
                const imageControls = document.getElementById('image-controls');
                
                if (active.type === 'i-text') {
                    textControls.style.display = 'block';
                    imageControls.style.display = 'none';
                    document.getElementById('obj-type-label').innerText = 'Edit Text';
                    
                    // Sync values
                    document.getElementById('text-input').value = active.text;
                    document.getElementById('font-select').value = active.fontFamily;
                    document.getElementById('size-input').value = active.fontSize;
                    document.getElementById('color-input').value = active.fill;
                } else {
                    textControls.style.display = 'none';
                    imageControls.style.display = 'block';
                    document.getElementById('obj-type-label').innerText = 'Edit Image';
                    document.getElementById('opacity-slider').value = active.opacity;
                }
            }

            // Real-time Text Updates
            document.getElementById('text-input').oninput = (e) => {
                const active = canvas.getActiveObject();
                if (active && active.type === 'i-text') {
                    active.set('text', e.target.value);
                    canvas.renderAll();
                }
            };

            document.getElementById('font-select').onchange = (e) => {
                const active = canvas.getActiveObject();
                if (active) {
                    active.set('fontFamily', e.target.value);
                    canvas.renderAll();
                }
            };

            document.getElementById('size-input').oninput = (e) => {
                const active = canvas.getActiveObject();
                if (active) {
                    active.set('fontSize', parseInt(e.target.value));
                    canvas.renderAll();
                }
            };

            document.getElementById('color-input').oninput = (e) => {
                const active = canvas.getActiveObject();
                if (active) {
                    active.set('fill', e.target.value);
                    canvas.renderAll();
                }
            };

            document.getElementById('opacity-slider').oninput = (e) => {
                const active = canvas.getActiveObject();
                if (active) {
                    active.set('opacity', parseFloat(e.target.value));
                    canvas.renderAll();
                }
            };

            // Layer Controls
            document.getElementById('bring-front').onclick = () => {
                const active = canvas.getActiveObject();
                if (active) active.bringToFront();
            };

            document.getElementById('send-back').onclick = () => {
                const active = canvas.getActiveObject();
                if (active) active.sendToBack();
            };

            document.getElementById('close-panel').onclick = () => {
                document.getElementById('properties-panel').style.display = 'none';
            };
        }
    </script>
</body>
</html>
